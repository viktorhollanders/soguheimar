description: > # this means to ignore newlines until "baseurl:"
  Söguheimar gefa ímyndunaraflinu stað í raunveruleikanum. Okkur langar að bjóða börnunum með okkur í heillandi ljóðrænt ferðalag inní ríki ímyndunaraflsins. Stað þar sem við getum á einlægan hátt upplifað náttúruna og reynt á alvöru hugrekki og þor og samhjálp. Þar sem að við getum  upplifað okkur sjálf sem hluta af samfélagi.
