<head>
  <meta charset="utf-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <title>
    {% if page.title %}{{ page.title }}{% else %}{{ site.title }}{% endif %}
  </title>
  <meta
    name="description"
    content="{% if page.excerpt %}{{
      page.excerpt | strip_html | strip_newlines | truncate: 160
    }}{% else %}{{ site.description }}{% endif %}"
  />
  <meta
    name="viewport"
    content="viewport-fit=cover, width=device-width, initial-scale=1.0"
  />

  <meta property="og:title" content="soguheimar" />
  <meta property="og:site_name" content="soguheimar" />
  <meta
    property="og:description"
    content="Við viljum gefa ímyndunaraflinu stað í raunveruleikanum."
  />
  <meta property="og:url" content="http://soguheimar.is" />
  <meta property="og:image" content="images/header-home.jpg" />

  <!--faviicon section-->
  <link rel="shortcut icon" href="favicons/favicon.ico" />
  <link
    rel="apple-touch-icon"
    href="/favicons/apple-touch-icon.png"
  />
  <link
    rel="icon"
    type="image/png"
    href="/favicons/favicon-32x32.png"
  />
  <link
    rel="icon"
    type="image/png"
    href="/favicons/favicon-16x16.png"
  />
  <link rel="manifest" href="/favicons/site.webmanifest" />
  <link
    rel="mask-icon"
    href="/favicons/safari-pinned-tab.svg"
    color="#9b9b9b"
  />
  <meta name="msapplication-TileColor" content="#da532c" />
  <meta name="theme-color" content="#ffffff" />
  <!-- style sheets -->
  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/normalize/7.0.0/normalize.min.css"
  />
  <link rel="stylesheet" href="{{
    "/css/main.css" | prepend: site.baseurl
  }}">
  <script>
    (function(i, s, o, g, r, a, m) {
      i["GoogleAnalyticsObject"] = r;
      (i[r] =
        i[r] ||
        function() {
          (i[r].q = i[r].q || []).push(arguments);
        }),
        (i[r].l = 1 * new Date());
      (a = s.createElement(o)), (m = s.getElementsByTagName(o)[0]);
      a.async = 1;
      a.src = g;
      m.parentNode.insertBefore(a, m);
    })(
      window,
      document,
      "script",
      "//www.google-analytics.com/analytics.js",

    ga("create", "UA-74716855-1", "auto");
    ga("send", "pageview");

</head>
